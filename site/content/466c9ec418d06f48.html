
<!DOCTYPE html>
<html lang="en">
<head>
    
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #0a0a0c;
        --surface: #16161a;
        --text: #e0e0e0;
        --text-muted: #94a3b8;
        --accent: #3b82f6;
        --serif: 'Merriweather', Georgia, serif;
        --sans: 'Inter', system-ui, sans-serif;
        --display: 'Playfair Display', serif;
        --max-width: 720px;
        --font-size-base: 1.125rem;
    }

    * { box-sizing: border-box; }
    body {
        background-color: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        margin: 0;
        padding: 0;
        line-height: 1.6;
        transition: background-color 0.3s ease;
    }

    a { color: var(--accent); text-decoration: none; transition: opacity 0.2s; }
    a:hover { opacity: 0.8; }

    .container {
        max-width: var(--max-width);
        margin: 0 auto;
        padding: 0 1.5rem;
    }

    /* Navbar */
    .nav-bar {
        position: sticky;
        top: 0;
        background: rgba(10, 10, 12, 0.8);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255,255,255,0.05);
        padding: 1rem 0;
        z-index: 1000;
    }
    .nav-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .back-link { font-weight: 600; font-size: 0.9rem; color: var(--text-muted); }
    .back-link:hover { color: var(--accent); }

    /* Header */
    header.site-header {
        padding: 6rem 0 3rem;
        text-align: left;
    }

    .logo {
        font-family: var(--display);
        font-size: 3.5rem;
        font-weight: 900;
        margin: 0;
        letter-spacing: -0.03em;
        color: #fff;
    }

    .tagline {
        font-size: 1.25rem;
        color: var(--text-muted);
        margin-top: 0.75rem;
        font-weight: 400;
    }

    .section-title {
        font-family: var(--sans);
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: var(--text-muted);
        margin: 4rem 0 2rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    /* Article Cards */
    .article-list { display: grid; gap: 1.5rem; padding: 2rem 0; }
    .article-card {
        background: var(--surface);
        padding: 2.5rem;
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.03);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
    }
    .article-card:hover {
        transform: translateY(-4px);
        border-color: var(--accent);
        box-shadow: 0 20px 40px -12px rgba(0,0,0,0.5);
    }
    .card-source {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--accent);
        font-weight: 700;
        margin-bottom: 1rem;
    }
    .card-title {
        font-family: var(--display);
        font-size: 2rem;
        margin: 0 0 1rem 0;
        line-height: 1.2;
        color: #fff;
    }
    .card-excerpt {
        color: var(--text-muted);
        font-size: 1.1rem;
        line-height: 1.6;
    }

    /* Article Content */
    .article-header { padding: 4rem 0 3rem; }
    .article-header h1 {
        font-family: var(--display);
        font-size: 3.5rem;
        line-height: 1.1;
        margin: 0 0 1.5rem 0;
        color: #fff;
        letter-spacing: -0.02em;
    }
    .article-meta {
        font-size: 1rem;
        color: var(--text-muted);
        border-bottom: 1px solid var(--surface);
        padding-bottom: 2rem;
    }
    .article-meta span { font-weight: 600; color: var(--text); }

    .hero-image {
        width: 100%;
        margin: 2rem 0 4rem;
        border-radius: 12px;
        overflow: hidden;
        background: var(--surface);
    }
    .hero-image img {
        width: 100%;
        display: block;
        max-height: 70vh;
        object-fit: cover;
    }
    .image-caption {
        font-size: 0.9rem;
        color: var(--text-muted);
        padding: 1rem 1.5rem;
        text-align: center;
        font-style: italic;
        border-top: 1px solid rgba(255,255,255,0.05);
    }

    .article-body {
        font-family: var(--serif);
        font-size: var(--font-size-base);
        line-height: 1.9;
        color: #d1d5db;
    }
    .article-body p { margin-bottom: 2.25rem; }
    .article-body h2, .article-body h3 {
        font-family: var(--display);
        color: #fff;
        margin-top: 3.5rem;
        margin-bottom: 1.5rem;
    }

    /* Controls */
    .controls { display: flex; gap: 0.5rem; }
    .btn-control {
        background: var(--surface);
        border: 1px solid rgba(255,255,255,0.1);
        color: var(--text);
        padding: 0.5rem 1rem;
        border-radius: 8px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
    }
    .btn-control:hover { border-color: var(--accent); color: var(--accent); }

    .source-footer {
        margin-top: 6rem;
        padding: 3rem;
        background: var(--surface);
        border-radius: 20px;
        text-align: center;
    }
    .source-link { font-weight: 700; font-size: 1.1rem; }

    footer.site-footer {
        margin-top: 8rem;
        padding: 4rem 0;
        text-align: center;
        color: var(--text-muted);
        font-size: 0.9rem;
        border-top: 1px solid var(--surface);
    }

    @media (max-width: 768px) {
        .logo { font-size: 2.75rem; }
        .article-header h1 { font-size: 2.5rem; }
        .article-card { padding: 1.5rem; }
        .card-title { font-size: 1.5rem; }
    }
</style>

    <title>How upper castes invented a Hindu majority | Asptor</title>
</head>
<body>
    <nav class="nav-bar">
        <div class="container nav-content">
            <a href="../index.html" class="back-link">← ASPTOR</a>
            <div class="controls">
                <button class="btn-control" onclick="changeFontSize(-2)">A-</button>
                <button class="btn-control" onclick="changeFontSize(2)">A+</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <article>
            <header class="article-header">
                <h1>How upper castes invented a Hindu majority</h1>
                <div class="article-meta">
                     • <span>THE CARAVAN</span> • <span>2026-05-07</span>
                </div>
            </header>

            

            <div class="article-body" id="article-content">
                <p>Content currently unavailable. This may be because the article body has not been fetched yet.</p>
            </div>

            <div class="source-footer">
                <a href="https://caravanmagazine.in/religion/how-upper-castes-invented-hindu-majority" target="_blank" rel="noopener" class="source-link">Read the original article at THE CARAVAN →</a>
            </div>
        </article>

        <footer class="site-footer">
            <p>Refined for reading by Asptor • Generated on 2026-05-07 23:31 UTC</p>
        </footer>
    </div>

    <script>
        function changeFontSize(delta) {
            const content = document.getElementById('article-content');
            const style = window.getComputedStyle(content, null).getPropertyValue('font-size');
            const currentSize = parseFloat(style);
            const newSize = currentSize + delta;
            if (newSize >= 12 && newSize <= 32) {
                content.style.fontSize = newSize + 'px';
                localStorage.setItem('asptor-font-size-px', newSize + 'px');
            }
        }

        // Restore preference
        window.onload = () => {
            const savedSize = localStorage.getItem('asptor-font-size-px');
            if (savedSize) {
                document.getElementById('article-content').style.fontSize = savedSize;
            }
        };
    </script>
</body>
</html>
